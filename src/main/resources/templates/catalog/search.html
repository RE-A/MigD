<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>MigD - 카탈로그 검색</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        .badge-pk       { background-color: #fd7e14; }
        .badge-comment  { background-color: #6c757d; font-size: 0.7em; vertical-align: middle; }
        .badge-code     { background-color: #0d6efd; font-size: 0.7em; vertical-align: middle; }
        .routine-block  { border-left: 3px solid #0d6efd; }
        .routine-code   {
            background: #f8f9fa;
            border-radius: 4px;
            overflow-x: auto;
            margin: 0;
            padding: 0.4rem 0.6rem;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.8em;
            line-height: 1.4;
        }
        .code-line      { display: flex; align-items: baseline; gap: 0.5rem; }
        .code-line-ctx  { color: #adb5bd; font-style: italic; }
        .code-text      { white-space: pre; }
        .line-num       { color: #ced4da; min-width: 3em; text-align: right; user-select: none; flex-shrink: 0; }
        .line-num-match { color: #6ea8fe; }
        .line-sep       { border-top: 1px dashed #dee2e6; margin: 0.2rem 0; }
        mark.kw         { background: #fff3cd; padding: 0 2px; border-radius: 2px; font-style: normal; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">⚡ MigD</a>
        <div class="d-flex gap-2">
            <a href="/migration" class="btn btn-sm btn-success">이관 실행</a>
            <a href="/schema" class="btn btn-sm btn-outline-info">스키마 이관</a>
            <a href="/catalog" class="btn btn-sm btn-warning">스키마 카탈로그</a>
            <a href="/presets" class="btn btn-sm btn-outline-light">프리셋 목록</a>
        </div>
    </div>
</nav>
<div class="container pb-5">

    <!-- 검색 폼 -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="get" action="/catalog/search" class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small mb-1">검색어 <span class="text-danger">*</span></label>
                    <input type="text" name="keyword" class="form-control form-control-sm"
                           th:value="${keyword}" placeholder="컬럼명, 테이블명, 변수명..." required autofocus/>
                </div>
                <div class="col-md-3">
                    <label class="form-label small mb-1">스키마 (선택)</label>
                    <select name="catalogId" class="form-select form-select-sm">
                        <option value="">전체 스키마</option>
                        <option th:each="c : ${catalogs}"
                                th:value="${c.id}"
                                th:text="${c.schemaName + ' (' + c.dbHost + ')'}"
                                th:selected="${c.id == catalogId}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small mb-1">대상 (선택)</label>
                    <select name="type" class="form-select form-select-sm">
                        <option value=""      th:selected="${type == ''}">전체 (테이블+프로시저)</option>
                        <option value="column" th:selected="${type == 'column'}">테이블·컬럼만</option>
                        <option value="routine" th:selected="${type == 'routine'}">프로시저·함수만</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary btn-sm w-100">검색</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 검색어 미입력 -->
    <div th:if="${keyword == null or keyword.isBlank()}" class="text-center text-muted py-5">
        <p>검색어를 입력하면 테이블·컬럼·프로시저에서 결과를 찾아드립니다.</p>
    </div>

    <th:block th:unless="${keyword == null or keyword.isBlank()}">

        <!-- 컬럼 검색 결과 -->
        <div th:if="${columnResults != null}" class="mb-4">
            <h6 class="fw-semibold mb-2">
                테이블 · 컬럼
                <span class="badge bg-secondary ms-1" th:text="${#lists.size(columnResults)}"></span>
            </h6>
            <div th:if="${#lists.isEmpty(columnResults)}" class="text-muted small ps-1">일치하는 컬럼 없음</div>
            <div class="table-responsive" th:unless="${#lists.isEmpty(columnResults)}">
                <table class="table table-sm table-hover shadow-sm bg-white rounded mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>스키마</th>
                        <th>테이블</th>
                        <th>컬럼명</th>
                        <th>타입</th>
                        <th>PK</th>
                        <th>한글명/설명</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${columnResults}">
                        <td class="text-muted small" th:text="${r.schemaName}"></td>
                        <td>
                            <a th:href="@{/catalog/{cid}/tables/{tid}(cid=${r.catalogId},tid=${r.tableId})}"
                               class="text-decoration-none">
                                <code th:text="${r.tableName}"></code>
                            </a>
                        </td>
                        <td><code th:text="${r.columnName}"></code></td>
                        <td class="text-muted small" th:text="${r.dataType}"></td>
                        <td>
                            <span th:if="${r.pk}" class="badge badge-pk">PK</span>
                        </td>
                        <td class="text-muted small" th:text="${r.columnComment}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 컬럼 전용 모드의 연관 루틴 -->
        <div th:if="${relatedRoutines != null and !#lists.isEmpty(relatedRoutines)}" class="mb-4">
            <h6 class="fw-semibold mb-2">
                연관 프로시저 · 함수
                <span class="badge bg-secondary ms-1" th:text="${#lists.size(relatedRoutines)}"></span>
                <small class="text-muted fw-normal">(DDL 본문에 키워드 포함)</small>
            </h6>
            <div th:each="r : ${relatedRoutines}" class="card mb-2 shadow-sm routine-block">
                <div class="card-header py-2 d-flex align-items-center gap-2">
                    <span class="badge bg-secondary small" th:text="${r.routineType}"></span>
                    <code th:text="${r.schemaName + '.' + r.routineName}"></code>
                    <small class="text-muted ms-auto"
                           th:text="${#lists.size(r.matchedLines) + '줄 일치'}"></small>
                </div>
                <div class="card-body p-2">
                    <div class="routine-code">
                        <th:block th:each="line, iterStat : ${r.matchedLines}">
                            <div th:if="${!iterStat.first}" class="line-sep"></div>
                            <div th:if="${line.contextBefore != null}" class="code-line code-line-ctx">
                                <span class="line-num" th:text="${line.lineNumber - 1 + ':'}"></span>
                                <span class="code-text" th:text="${line.contextBefore}"></span>
                            </div>
                            <div class="code-line">
                                <span class="line-num line-num-match" th:text="${line.lineNumber + ':'}"></span>
                                <span th:if="${line.inComment}" class="badge badge-comment me-1">주석 내</span>
                                <span th:unless="${line.inComment}" class="badge badge-code me-1">코드</span>
                                <span class="matched-content code-text" th:text="${line.content}"></span>
                            </div>
                            <div th:if="${line.contextAfter != null}" class="code-line code-line-ctx">
                                <span class="line-num" th:text="${line.lineNumber + 1 + ':'}"></span>
                                <span class="code-text" th:text="${line.contextAfter}"></span>
                            </div>
                        </th:block>
                    </div>
                </div>
            </div>
        </div>

        <!-- 프로시저·함수 본문 검색 결과 -->
        <div th:if="${routineResults != null}" class="mb-4">
            <h6 class="fw-semibold mb-2">
                프로시저 · 함수
                <span class="badge bg-secondary ms-1" th:text="${#lists.size(routineResults)}"></span>
            </h6>
            <div th:if="${#lists.isEmpty(routineResults)}" class="text-muted small ps-1">일치하는 루틴 없음</div>
            <div th:each="r : ${routineResults}" class="card mb-2 shadow-sm routine-block">
                <div class="card-header py-2 d-flex align-items-center gap-2">
                    <span class="badge bg-info text-dark small" th:text="${r.routineType}"></span>
                    <code th:text="${r.schemaName + '.' + r.routineName}"></code>
                    <small class="text-muted ms-auto"
                           th:text="${#lists.size(r.matchedLines) + '줄 일치'}"></small>
                </div>
                <div class="card-body p-2">
                    <div class="routine-code">
                        <th:block th:each="line, iterStat : ${r.matchedLines}">
                            <div th:if="${!iterStat.first}" class="line-sep"></div>
                            <div th:if="${line.contextBefore != null}" class="code-line code-line-ctx">
                                <span class="line-num" th:text="${line.lineNumber - 1 + ':'}"></span>
                                <span class="code-text" th:text="${line.contextBefore}"></span>
                            </div>
                            <div class="code-line">
                                <span class="line-num line-num-match" th:text="${line.lineNumber + ':'}"></span>
                                <span th:if="${line.inComment}" class="badge badge-comment me-1">주석 내</span>
                                <span th:unless="${line.inComment}" class="badge badge-code me-1">코드</span>
                                <span class="matched-content code-text" th:text="${line.content}"></span>
                            </div>
                            <div th:if="${line.contextAfter != null}" class="code-line code-line-ctx">
                                <span class="line-num" th:text="${line.lineNumber + 1 + ':'}"></span>
                                <span class="code-text" th:text="${line.contextAfter}"></span>
                            </div>
                        </th:block>
                    </div>
                </div>
            </div>
        </div>

    </th:block>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', () => {
        const keyword = /*[[${keyword}]]*/ '';
        if (!keyword) return;
        const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(escaped, 'gi');
        document.querySelectorAll('.matched-content').forEach(el => {
            el.innerHTML = el.textContent.replace(regex, '<mark class="kw">$&</mark>');
        });
    });
</script>
</body>
</html>
