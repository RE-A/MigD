<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>MigD - 테이블 조회</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        .table-list-item { cursor: pointer; }
        .table-list-item.active { background-color: #0d6efd; color: #fff; }
        .table-list-item.active small { color: #cfe2ff !important; }
        .sidebar { max-height: calc(100vh - 140px); overflow-y: auto; }
        .column-table th { white-space: nowrap; }
        .badge-pk { background-color: #fd7e14; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">⚡ MigD</a>
        <div class="d-flex gap-2">
            <a href="/migration" class="btn btn-sm btn-success">이관 실행</a>
            <a href="/schema" class="btn btn-sm btn-outline-info">스키마 이관</a>
            <a href="/catalog" class="btn btn-sm btn-warning">스키마 카탈로그</a>
            <a href="/presets" class="btn btn-sm btn-outline-light">프리셋 목록</a>
        </div>
    </div>
</nav>
<div class="container-fluid pb-5">
    <div class="d-flex align-items-center gap-2 mb-3 px-2">
        <a href="/catalog" class="btn btn-outline-secondary btn-sm">← 목록</a>
        <h5 class="mb-0">
            <code th:text="${catalog.schemaName}"></code>
            <small class="text-muted fw-normal fs-6 ms-2" th:text="${catalog.dbHost + ' / ' + catalog.dbName}"></small>
        </h5>
        <a th:href="@{/catalog/search(catalogId=${catalog.id})}"
           class="btn btn-outline-primary btn-sm ms-auto">이 스키마 검색</a>
    </div>

    <div class="row g-0">
        <!-- 테이블 목록 사이드바 -->
        <div class="col-md-3 col-lg-2 pe-2">
            <div class="card shadow-sm">
                <div class="card-header py-2 small fw-semibold">
                    테이블 목록
                    <span class="badge bg-secondary ms-1" th:text="${catalog.tableCount}"></span>
                </div>
                <div class="sidebar">
                    <div th:if="${#lists.isEmpty(tables)}" class="p-3 text-muted small">테이블 없음</div>
                    <a th:each="tbl : ${tables}"
                       th:href="@{/catalog/{cid}/tables/{tid}(cid=${catalog.id},tid=${tbl.id})}"
                       class="list-group-item list-group-item-action table-list-item py-2 px-3 border-0 border-bottom"
                       th:classappend="${tbl.id == selectedTableId} ? ' active' : ''">
                        <th:block th:if="${tbl.tableComment != null}">
                            <span class="d-block small fw-semibold" th:text="${tbl.tableComment}"></span>
                            <span class="d-block" style="font-size:0.75em;opacity:0.75"
                                  th:text="${'(' + tbl.tableName + ')'}"></span>
                        </th:block>
                        <span th:unless="${tbl.tableComment != null}"
                              class="d-block small fw-semibold" th:text="${tbl.tableName}"></span>
                    </a>
                </div>
            </div>
        </div>

        <!-- 컬럼 목록 -->
        <div class="col-md-9 col-lg-10">
            <div class="card shadow-sm">
                <div class="card-header py-2 small fw-semibold" th:if="${columns != null}">
                    컬럼 목록
                    <span class="badge bg-secondary ms-1" th:text="${#lists.size(columns)}"></span>
                </div>
                <div class="card-body p-0" th:if="${columns != null}">
                    <div th:if="${#lists.isEmpty(columns)}" class="p-4 text-muted small">컬럼 없음</div>
                    <div class="table-responsive" th:unless="${#lists.isEmpty(columns)}">
                        <table class="table table-sm table-hover column-table mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>컬럼명</th>
                                <th>타입</th>
                                <th>Nullable</th>
                                <th>PK</th>
                                <th>한글명/설명</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="col : ${columns}">
                                <td class="text-muted small" th:text="${col.ordinalPosition}"></td>
                                <td>
                                    <code th:text="${col.columnName}"></code>
                                </td>
                                <td class="text-muted small" th:text="${col.dataType}"></td>
                                <td>
                                    <span th:if="${col.nullable}" class="text-muted small">YES</span>
                                    <span th:unless="${col.nullable}" class="fw-semibold small">NO</span>
                                </td>
                                <td>
                                    <span th:if="${col.pk}" class="badge badge-pk">PK</span>
                                </td>
                                <td class="text-muted small" th:text="${col.columnComment}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-body text-muted" th:unless="${columns != null}">
                    왼쪽에서 테이블을 선택하면 컬럼 목록이 표시됩니다.
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
