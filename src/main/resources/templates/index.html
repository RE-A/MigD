<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>MigD - 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container pb-5">
    <h4 class="mb-4">대시보드</h4>

    <!-- 통계 카드 -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card text-center shadow-sm h-100">
                <div class="card-body py-4">
                    <div class="display-5 fw-bold text-primary" th:text="${presetCount}">0</div>
                    <div class="text-muted mt-1">등록된 프리셋</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center shadow-sm h-100">
                <div class="card-body py-4">
                    <div class="display-5 fw-bold text-success" th:text="${tableCount}">0</div>
                    <div class="text-muted mt-1">등록된 이관 테이블</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex flex-column justify-content-center align-items-center gap-2 py-4">
                    <a href="/migration" class="btn btn-success w-100">▶ 이관 실행</a>
                    <a href="/schema" class="btn btn-outline-info w-100">스키마 이관</a>
                    <a href="/presets/new" class="btn btn-outline-primary w-100">+ 새 프리셋</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 최근 프리셋 -->
    <div class="card shadow-sm">
        <div class="card-header fw-semibold">최근 프리셋</div>
        <div th:if="${#lists.isEmpty(recentPresets)}" class="card-body text-muted text-center py-4">
            등록된 프리셋이 없습니다.
        </div>
        <div th:unless="${#lists.isEmpty(recentPresets)}" class="card-body p-0">
            <table class="table table-hover table-sm mb-0">
                <thead class="table-light">
                <tr>
                    <th>프리셋명</th>
                    <th>설명</th>
                    <th style="width:130px">등록일</th>
                    <th style="width:200px"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${recentPresets}">
                    <td class="align-middle fw-semibold" th:text="${p.name}"></td>
                    <td class="align-middle small text-muted" th:text="${p.description}"></td>
                    <td class="align-middle small text-muted"
                        th:text="${#temporals.format(p.createdAt, 'yy-MM-dd HH:mm')}"></td>
                    <td class="align-middle">
                        <div class="d-flex gap-1 justify-content-end">
                            <a th:href="@{/migration(presetId=${p.id})}"
                               class="btn btn-success btn-sm">이관</a>
                            <a href="/schema"
                               class="btn btn-outline-info btn-sm">스키마</a>
                            <a th:href="@{/presets/{id}/edit(id=${p.id})}"
                               class="btn btn-outline-secondary btn-sm">편집</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
