<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>MigD - 프리셋 목록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">⚡ MigD</a>
        <div class="d-flex gap-2">
            <a href="/migration" class="btn btn-sm btn-success">이관 실행</a>
            <a href="/schema" class="btn btn-sm btn-outline-info">스키마 이관</a>
            <a href="/catalog" class="btn btn-sm btn-warning">스키마 카탈로그</a>
            <a href="/presets" class="btn btn-sm btn-outline-light">프리셋 목록</a>
        </div>
    </div>
</nav>
<div class="container pb-5">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">프리셋 목록</h4>
        <a href="/presets/new" class="btn btn-primary btn-sm">+ 새 프리셋</a>
    </div>

    <div th:if="${#lists.isEmpty(presets)}" class="text-center text-muted py-5">
        <p>등록된 프리셋이 없습니다. 새 프리셋을 추가하세요.</p>
    </div>

    <div class="row row-cols-1 row-cols-md-2 g-3" th:unless="${#lists.isEmpty(presets)}">
        <div class="col" th:each="preset : ${presets}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${preset.name}">프리셋명</h5>
                    <p class="card-text text-muted small" th:if="${preset.description}"
                       th:text="${preset.description}"></p>
                    <p class="card-text text-muted small">
                        등록일: <span th:text="${#temporals.format(preset.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </p>
                </div>
                <div class="card-footer d-flex gap-2 flex-wrap">
                    <a th:href="@{/migration(presetId=${preset.id})}"
                       class="btn btn-success btn-sm">이관 실행</a>
                    <a href="/schema"
                       class="btn btn-outline-info btn-sm">스키마 이관</a>
                    <a th:href="@{/presets/{id}/edit(id=${preset.id})}"
                       class="btn btn-outline-secondary btn-sm">편집</a>
                    <form th:action="@{/presets/{id}/delete(id=${preset.id})}" method="post"
                          onsubmit="return confirm('프리셋을 삭제하시겠습니까?')">
                        <button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
