<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>MigD - 프리셋 편집</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">⚡ MigD</a>
        <div class="d-flex gap-2">
            <a href="/migration" class="btn btn-sm btn-success">이관 실행</a>
            <a href="/schema" class="btn btn-sm btn-outline-info">스키마 이관</a>
            <a href="/presets" class="btn btn-sm btn-outline-light">프리셋 목록</a>
        </div>
    </div>
</nav>
<div class="container pb-5">
    <h4 class="mb-4" th:text="${isNew} ? '새 프리셋 추가' : '프리셋 편집'">프리셋</h4>

    <form th:action="@{/presets}" th:object="${preset}" method="post">
        <input type="hidden" th:field="*{id}"/>

        <!-- 기본 정보 -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header fw-semibold">기본 정보</div>
            <div class="card-body row g-3">
                <div class="col-md-6">
                    <label class="form-label">프리셋 이름 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{name}" required/>
                </div>
                <div class="col-md-6">
                    <label class="form-label">설명</label>
                    <input type="text" class="form-control" th:field="*{description}"/>
                </div>
            </div>
        </div>

        <!-- 테이블 목록 -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center fw-semibold">
                <div class="d-flex align-items-center gap-2">
                    이관 테이블 목록
                    <span id="tableCounter" class="badge bg-secondary fw-normal"></span>
                </div>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-sm btn-outline-danger"
                            onclick="deleteSelected()">선택 삭제</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary"
                            onclick="toggleBulkInput()">일괄 입력</button>
                    <button type="button" class="btn btn-sm btn-outline-success" onclick="addTableRow()">+ 행 추가</button>
                </div>
            </div>
            <!-- 일괄 입력 영역 -->
            <div id="bulkInputArea" class="card-body border-bottom" style="display:none;">
                <label class="form-label fw-semibold small">테이블명을 줄바꿈으로 구분하여 입력</label>
                <div class="form-text mb-2">
                    스키마 포함 가능: <code>public.product</code> / 스키마 생략 시 <code>public</code> 자동 적용
                </div>
                <textarea id="bulkTextarea" class="form-control form-control-sm font-monospace mb-2"
                          rows="5" placeholder="product&#10;order&#10;public.price"></textarea>
                <button type="button" class="btn btn-sm btn-success" onclick="bulkAddTables()">추가</button>
                <button type="button" class="btn btn-sm btn-outline-secondary ms-1"
                        onclick="toggleBulkInput()">닫기</button>
            </div>
            <!-- 검색 -->
            <div class="card-body border-bottom py-2">
                <input type="text" id="tableSearch" class="form-control form-control-sm"
                       placeholder="테이블명 검색..." oninput="filterTable(this.value)"/>
            </div>
            <div style="max-height: 420px; overflow-y: auto;">
                <table class="table table-bordered table-sm mb-0">
                    <thead class="table-light" style="position: sticky; top: 0; z-index: 1;">
                    <tr>
                        <th style="width:32px">
                            <input type="checkbox" class="form-check-input" id="selectAll"
                                   onchange="toggleSelectAll(this.checked)"/>
                        </th>
                        <th style="width:120px">스키마</th>
                        <th>테이블명</th>
                        <th>WHERE 조건 (선택)</th>
                        <th style="width:60px">순서</th>
                        <th style="width:40px"></th>
                    </tr>
                    </thead>
                    <tbody id="tableBody">
                    <tr th:each="t, i : *{tables}">
                        <input type="hidden" th:name="'tables[' + ${i.index} + '].id'" th:value="${t.id}"/>
                        <input type="hidden" th:name="'tables[' + ${i.index} + '].presetId'" th:value="${t.presetId}"/>
                        <td><input type="checkbox" class="form-check-input row-check"/></td>
                        <td><input type="text" class="form-control form-control-sm"
                                   th:name="'tables[' + ${i.index} + '].schemaName'"
                                   th:value="${t.schemaName}" placeholder="public"/></td>
                        <td><input type="text" class="form-control form-control-sm"
                                   th:name="'tables[' + ${i.index} + '].tableName'"
                                   th:value="${t.tableName}" required/></td>
                        <td><input type="text" class="form-control form-control-sm"
                                   th:name="'tables[' + ${i.index} + '].whereCondition'"
                                   th:value="${t.whereCondition}"
                                   placeholder="예: created_at &gt; '2024-01-01'"/></td>
                        <td><input type="number" class="form-control form-control-sm"
                                   th:name="'tables[' + ${i.index} + '].orderNum'"
                                   th:value="${t.orderNum}"/></td>
                        <td><button type="button" class="btn btn-sm btn-outline-danger"
                                    onclick="removeRow(this)">×</button></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">저장</button>
            <a href="/presets" class="btn btn-outline-secondary">취소</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let tableRowCount = document.querySelectorAll('#tableBody tr').length;

    function updateCounter() {
        const allRows = document.querySelectorAll('#tableBody tr');
        const visibleRows = [...allRows].filter(tr => tr.style.display !== 'none');
        const badge = document.getElementById('tableCounter');
        badge.textContent = allRows.length === visibleRows.length
            ? `${allRows.length}개`
            : `${visibleRows.length} / ${allRows.length}개`;
    }

    function filterTable(query) {
        const q = query.toLowerCase();
        document.querySelectorAll('#tableBody tr').forEach(tr => {
            const schema = tr.querySelector('input[name$=".schemaName"]')?.value ?? '';
            const table  = tr.querySelector('input[name$=".tableName"]')?.value ?? '';
            tr.style.display = (schema + '.' + table).toLowerCase().includes(q) ? '' : 'none';
        });
        updateCounter();
    }

    function toggleSelectAll(checked) {
        document.querySelectorAll('#tableBody tr').forEach(tr => {
            if (tr.style.display !== 'none') {
                const cb = tr.querySelector('.row-check');
                if (cb) cb.checked = checked;
            }
        });
    }

    function deleteSelected() {
        const checked = [...document.querySelectorAll('#tableBody .row-check:checked')];
        if (checked.length === 0) return;
        checked.forEach(cb => cb.closest('tr').remove());
        document.getElementById('selectAll').checked = false;
        updateCounter();
    }

    function addTableRow(schema = 'public', table = '') {
        const idx = tableRowCount++;
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="checkbox" class="form-check-input row-check"/></td>
            <td><input type="text" class="form-control form-control-sm"
                       name="tables[${idx}].schemaName" value="${schema}" placeholder="public"/></td>
            <td><input type="text" class="form-control form-control-sm"
                       name="tables[${idx}].tableName" value="${table}" required/></td>
            <td><input type="text" class="form-control form-control-sm"
                       name="tables[${idx}].whereCondition" placeholder="예: id > 1000"/></td>
            <td><input type="number" class="form-control form-control-sm"
                       name="tables[${idx}].orderNum" value="${idx}"/></td>
            <td><button type="button" class="btn btn-sm btn-outline-danger"
                        onclick="removeRow(this)">×</button></td>
        `;
        document.getElementById('tableBody').appendChild(tr);
        updateCounter();
    }

    function toggleBulkInput() {
        const area = document.getElementById('bulkInputArea');
        area.style.display = area.style.display === 'none' ? 'block' : 'none';
        if (area.style.display === 'block') document.getElementById('bulkTextarea').focus();
    }

    function bulkAddTables() {
        const text = document.getElementById('bulkTextarea').value;
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        const existing = new Set(
            [...document.querySelectorAll('#tableBody input[name$=".tableName"]')]
                .map(el => el.value.toLowerCase())
        );
        let added = 0;
        lines.forEach(line => {
            let schema = 'public', table = line;
            if (line.includes('.')) {
                const parts = line.split('.');
                schema = parts[0];
                table = parts.slice(1).join('.');
            }
            if (!existing.has(table.toLowerCase())) {
                addTableRow(schema, table);
                existing.add(table.toLowerCase());
                added++;
            }
        });
        document.getElementById('bulkTextarea').value = '';
        if (added > 0) toggleBulkInput();
    }

    function removeRow(btn) {
        btn.closest('tr').remove();
        updateCounter();
    }

    updateCounter();
</script>
</body>
</html>
