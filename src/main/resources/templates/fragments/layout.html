<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} ?: 'MigD - DB Migration Tool'">MigD</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .badge-skipped  { background-color: #6c757d; }
        .badge-created  { background-color: #198754; }
        .badge-failed   { background-color: #dc3545; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/presets">⚡ MigD</a>
        <div>
            <a class="btn btn-sm btn-outline-light" href="/presets">프리셋 목록</a>
        </div>
    </div>
</nav>
<div class="container pb-5">

    <!-- 플래시 메시지 -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 본문 (각 페이지에서 th:replace로 삽입) -->
    <th:block th:fragment="content"></th:block>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
