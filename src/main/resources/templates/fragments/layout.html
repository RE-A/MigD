<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} ?: 'MigD - DB Migration Tool'">MigD</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .badge-skipped  { background-color: #6c757d; }
        .badge-created  { background-color: #198754; }
        .badge-failed   { background-color: #dc3545; }
    </style>
</head>
<body class="bg-light">

<!-- ── 공통 navbar fragment ──────────────────────────────── -->
<nav th:fragment="navbar" class="navbar navbar-expand navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">⚡ MigD</a>
        <ul class="navbar-nav me-auto">
            <li class="nav-item">
                <a class="nav-link" href="/migration">이관 실행</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/schema">스키마 이관</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/catalog">스키마 카탈로그</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/presets">프리셋 목록</a>
            </li>
        </ul>
    </div>
</nav>

<!-- ── 기존 layout fragment (preset 페이지용) ─────────────── -->
<div th:fragment="content">
    <div class="container pb-5">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <th:block th:fragment="content"></th:block>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
