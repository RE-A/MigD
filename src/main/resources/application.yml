spring:
  datasource:
    url: jdbc:h2:file:./data/preset_db;AUTO_SERVER=TRUE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  h2:
    console:
      enabled: true
      path: /h2-console
  thymeleaf:
    cache: false
    encoding: UTF-8

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.migd.domain
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

server:
  port: 8080

logging:
  level:
    com.migd: DEBUG
    org.mybatis: INFO
  file:
    name: logs/migd.log
  logback:
    rollingpolicy:
      file-name-pattern: logs/migd.%d{yyyy-MM-dd}.%i.log
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 500MB

migd:
  # pg_dump 실행 파일 경로 - 환경에 맞게 수정
  pg-dump-path: "C:/Program Files/PostgreSQL/16/bin/pg_dump.exe"
  # Source DB (QA DB) 설정 - 사용자가 화면에서 변경 불가
  source-db:
    host: "qa-db.example.com"
    port: 5432
    db: "qadb"
    user: "qauser"
    password: "qapassword"
